<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runa Kala Library</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --saffron:#F77F00;
    --warm-gold:#E6B325;
    --deep-maroon:#5A1E2A;
    --cream:#F8F1E5;
    --peach-gold:linear-gradient(135deg,#FFB07C,#F6C453);
}

body{
    background:var(--cream);
    color:var(--deep-maroon);
}

/* NAV */
nav{
    background:rgba(248,241,229,0.95);
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--warm-gold);
    position:sticky;
    top:0;
}

nav a{
    margin:0 10px;
    text-decoration:none;
    color:var(--deep-maroon);
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:var(--peach-gold);
}

.hero h1{ font-size:3rem; }

/* SECTION */
.section{
    padding:80px 15%;
}

/* BOOK */
.book-card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
}

.book-detail{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}

.review-item{
    background:#fff;
    padding:10px;
    margin-top:10px;
    border-left:3px solid var(--warm-gold);
}

/* FORM */
input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:30px;
    width:300px;
}

/* FORUM */
.forum-post{
    background:white;
    padding:10px;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:var(--deep-maroon);
    color:white;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div><b>Runa Kala Library</b></div>
<div>
<a href="#home">Home</a>
<a href="#books">Books</a>
<a href="#forum">Forum</a>
<a onclick="openModal()">Login</a>
</div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
<h1>Runa Kala Library</h1>
<p>A Dawn of Stories ✨</p>
</section>

<!-- BOOK -->
<section class="section" id="books">
<h2>Book Collection</h2>
<div id="bookList"></div>
<div id="bookDetail"></div>
</section>

<!-- FORUM -->
<section class="section" id="forum">
<h2>Forum</h2>

<form onsubmit="postForum(event)">
<input id="forumPesan" placeholder="Tulis sesuatu...">
<button>Post</button>
</form>

<div id="forumList"></div>
</section>

<!-- LOGIN -->
<div class="modal" id="authModal">
<div class="modal-content">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginError"></p>
</div>
</div>

<footer>© 2026 Runa Kala Library</footer>

<script>

/* ================= LOGIN ================= */

function openModal(){ authModal.style.display="flex"; }

window.onclick=function(e){
if(e.target==authModal){ authModal.style.display="none"; }
}

function login(){
let email=loginEmail.value;
let password=loginPassword.value;

let users=JSON.parse(localStorage.getItem("users"))||[];

let user=users.find(u=>u.email===email && u.password===password);

if(!user){
loginError.innerText="Salah!";
return;
}

localStorage.setItem("activeUser",email);
alert("Login berhasil");
authModal.style.display="none";
}

/* ================= BOOK ================= */

let books=[
{id:1,judul:"Laut Bercerita",penulis:"Leila S. Chudori",sinopsis:"Kisah aktivis."},
{id:2,judul:"Filosofi Teras",penulis:"Henry Manampiring",sinopsis:"Stoisisme modern."}
];

function loadBooks(){
let html="";
books.forEach(b=>{
html+=`<div class="book-card" onclick="showBook(${b.id})">
<h3>${b.judul}</h3>
<p>${b.penulis}</p>
</div>`;
});
bookList.innerHTML=html;
}
loadBooks();

function showBook(id){
let b=books.find(x=>x.id===id);

bookDetail.innerHTML=`
<div class="book-detail">
<h2>${b.judul}</h2>
<p>${b.sinopsis}</p>

<textarea id="reviewText"></textarea>
<button onclick="kirimReview(${id})">Kirim</button>

<div id="reviewList"></div>
</div>
`;

tampilkanReview(id);
}

/* ================= REVIEW ================= */

function kirimReview(id){
let user=localStorage.getItem("activeUser");
if(!user){ alert("Login dulu"); return; }

let text=reviewText.value;

let reviews=JSON.parse(localStorage.getItem("reviews"))||[];

reviews.push({id,user,text});
localStorage.setItem("reviews",JSON.stringify(reviews));

reviewText.value="";
tampilkanReview(id);
}

function tampilkanReview(id){
let reviews=JSON.parse(localStorage.getItem("reviews"))||[];

let html="";
reviews.filter(r=>r.id===id).forEach(r=>{
html+=`<div class="review-item"><b>${r.user}</b><p>${r.text}</p></div>`;
});

reviewList.innerHTML=html;
}

/* ================= FORUM ================= */

function postForum(e){
e.preventDefault();

let user=localStorage.getItem("activeUser");
if(!user){ alert("Login dulu"); return; }

let posts=JSON.parse(localStorage.getItem("forum"))||[];

posts.push({user,text:forumPesan.value});
localStorage.setItem("forum",JSON.stringify(posts));

forumPesan.value="";
loadForum();
}

function loadForum(){
let posts=JSON.parse(localStorage.getItem("forum"))||[];

let html="";
posts.forEach(p=>{
html+=`<div class="forum-post"><b>${p.user}</b><p>${p.text}</p></div>`;
});

forumList.innerHTML=html;
}
loadForum();

</script>

</body>
</html>
