<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runa Kala Library</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

:root{
--saffron:#F77F00;
--gold:#E6B325;
--maroon:#5A1E2A;
--cream:#F8F1E5;
}

body{background:var(--cream);color:var(--maroon);}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px 8%;
background:white;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid var(--gold);
}

nav a{
margin:0 10px;
text-decoration:none;
color:var(--maroon);
font-weight:500;
cursor:pointer;
}

.logo{font-weight:700;font-size:20px;}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#FFB07C,#F6C453);
}

.hero h1{font-size:50px;}
.hero p{margin:15px 0;}

.section{
padding:80px 10%;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-top:15px;
}

/* FORM */
input, textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
background:var(--maroon);
color:white;
border-radius:8px;
cursor:pointer;
}

/* FORUM */
.post{
border-left:4px solid var(--saffron);
padding:10px;
margin-top:10px;
background:white;
border-radius:8px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
}

</style>
</head>

<body>

<nav>
<div class="logo">Runa Kala Library</div>
<div>
<a href="#home">Home</a>
<a href="#forum">Forum</a>
<a href="#events">Events</a>
<a onclick="openModal()">Login</a>
</div>
</nav>

<section class="hero" id="home">
<h1>RUNA KALA LIBRARY</h1>
<p id="userGreeting">A creative space for stories ✨</p>
</section>

<!-- FORUM -->
<section class="section" id="forum">
<h2>Community Forum</h2>

<form onsubmit="postForum(event)">
<textarea id="forumText" placeholder="Tulis sesuatu..." required></textarea>
<button>Post</button>
</form>

<div id="forumList"></div>
</section>

<!-- EVENTS -->
<section class="section" id="events">
<h2>Library Events</h2>

<div class="card">
<h3>Creative Writing Workshop</h3>
<p>12 April 2026</p>
<button onclick="openEventForm('Creative Writing Workshop')">Daftar</button>
</div>

<div class="card">
<h3>Book Discussion Night</h3>
<p>25 April 2026</p>
<button onclick="openEventForm('Book Discussion Night')">Daftar</button>
</div>

<p id="eventNotif"></p>
</section>

<!-- LOGIN MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p>Belum punya akun? <span onclick="register()" style="color:blue;cursor:pointer;">Daftar</span></p>

</div>
</div>

<script>

/* ================= LOGIN ================= */

function openModal(){
modal.style.display="flex";
}

window.onclick=(e)=>{
if(e.target==modal) modal.style.display="none";
}

function register(){
let email=prompt("Masukkan email:");
let pass=prompt("Password (min 6 karakter):");

if(pass.length<6){alert("Password terlalu pendek");return;}

let users=JSON.parse(localStorage.getItem("users"))||[];

if(users.find(u=>u.email===email)){
alert("Sudah terdaftar!");
return;
}

users.push({email,pass});
localStorage.setItem("users",JSON.stringify(users));

alert("Registrasi berhasil!");
}

function login(){
let e=email.value;
let p=password.value;

let users=JSON.parse(localStorage.getItem("users"))||[];

let user=users.find(u=>u.email===e && u.pass===p);

if(!user){
alert("Login gagal!");
return;
}

localStorage.setItem("activeUser", e);

userGreeting.innerHTML="Welcome, "+e+" ✨";
modal.style.display="none";
}

/* ================= FORUM ================= */

function postForum(e){
e.preventDefault();

let user=localStorage.getItem("activeUser");

if(!user){
alert("Login dulu!");
return;
}

let posts=JSON.parse(localStorage.getItem("posts"))||[];

posts.push({
user:user,
text:forumText.value,
time:new Date().toLocaleString()
});

localStorage.setItem("posts",JSON.stringify(posts));

forumText.value="";
loadForum();
}

function loadForum(){
let posts=JSON.parse(localStorage.getItem("posts"))||[];

let html="";
posts.reverse().forEach(p=>{
html+=`
<div class="post">
<b>${p.user}</b>
<p>${p.text}</p>
<small>${p.time}</small>
</div>
`;
});

forumList.innerHTML=html;
}

loadForum();

/* ================= EVENTS ================= */

function openEventForm(nama){
let namaUser=prompt("Nama kamu:");
let email=prompt("Email kamu:");

let data=JSON.parse(localStorage.getItem("event"))||[];

data.push({
event:nama,
nama:namaUser,
email:email
});

localStorage.setItem("event",JSON.stringify(data));

eventNotif.innerHTML="✅ Berhasil daftar "+nama;
}

/* LOAD USER */
let active=localStorage.getItem("activeUser");
if(active){
userGreeting.innerHTML="Welcome, "+active+" ✨";
}

</script>

</body>
</html>
